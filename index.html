<!DOCTYPE html>
<html lang="en">
<head>

  <title>My Portfolio</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    /* LAYOUT */
    .container {
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      padding: 40px 20px;
      background: #f5f5f5;
    }

    .sidebar h2 {
      font-size: 18px;
      margin-bottom: 30px;
    }

    .sidebar a {
      display: block;
      text-decoration: none;
      color: black;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .sidebar a:hover {
      text-decoration: underline;
    }

    /* MAIN CONTENT */
    .main {
  margin-left: 240px;
  padding: 40px;
  width: calc(100% - 240px);
    }

    /* IMAGE BLOCK */
   .work {
  display: flex;
  justify-content: flex-end; /* pushes image right */
  margin-bottom: 80px;
    }

  .work img {
  width: 500px; /* adjust this */
  max-width: 100%;
  height: auto;
  display: block;
    }

    .caption {
      font-size: 14px;
      margin-top: 10px;
      color: #555;
    }

    .content {
  width: 500px; /* match image width */
}

  </style>
</head>

</div>

    <!-- IMAGE BLOCK 2 -->
