<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Photography</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    /* LAYOUT */
    .container {
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      padding: 40px 20px;
      background: #f5f5f5;
    }

    .sidebar h2 {
      font-size: 18px;
      margin-bottom: 30px;
    }

    .sidebar a {
      display: block;
      text-decoration: none;
      color: black;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .sidebar a:hover {
      text-decoration: underline;
    }

    /* MAIN */
    .main {
      margin-left: 240px;
      padding: 40px;
      width: calc(100% - 240px);
    }

    .main h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    /* GALLERY */
    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
    }

    .item img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* FULL WIDTH LANDSCAPE */
    .full {
      grid-column: span 3;
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .gallery {
        grid-template-columns: 1fr;
      }

      .full {
        grid-column: span 1;
      }
    }
  </style>
</head>
