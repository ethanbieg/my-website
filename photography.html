<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photography</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    /* MAIN LAYOUT */
    .container {
      display: flex;
    }

    /* SIDEBAR (LEFT) */
    .sidebar {
      width: 220px;
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      padding: 40px 20px;
      background: #f5f5f5;
    }

    .sidebar h2 {
      font-size: 18px;
      margin-bottom: 30px;
    }

    .sidebar a {
      display: block;
      text-decoration: none;
      color: black;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .sidebar a:hover {
      text-decoration: underline;
    }

    /* MAIN CONTENT (RIGHT) */
    .main {
      margin-left: 240px;
      padding: 40px;
      width: calc(100% - 240px);
    }

    /* GRID FOR PROJECTS */
    .photo-grid {
      display: flex;
      gap: 40px;
    }

    .photo-item {
      width: 100%;
      max-width: 300px;
  position: relative;
  overflow: hidden;
}

.photo-item img {
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.photo-item:hover img {
  transform: scale(0.92); /* shrinks image */
  box-shadow: 0 0 0 8px transparent; /* white border */
}
      


.photo-item a {
  text-decoration: none;
  color: inherit; /* keeps your normal text color */
  display: block;

    }

    .photo-item img {
      width: 100%;
      height: auto;
      display: block;
      margin-bottom: 10px;
      
    }

    .photo-item h3 {
      font-size: 16px;
      margin: 0 0 5px;
    }

    .photo-item p {
      font-size: 13px;
      color: #555;
      margin: 0;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>My Work</h2>
    
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="photography.html">Photography</a>
    <a href="videography.html">Videography</a>
    <a href="#">Music</a>
    <a href="#">Contact</a>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">

    <div class="photo-grid">

      <!-- PROJECT 1 -->
      <div class="photo-item">
        <a href="project1.html">
          <img src="images/wedding4x5.jpg" alt="Project 1">
          <h3>Wedding Photography</h3>
          <p>Highlights from weddings I've captured.</p>
        </a>
      </div>

      <!-- PROJECT 2 -->
      <div class="photo-item">
        <a href="project2.html">
          <img src="images/portraits.jpg" alt="Project 2">
          <h3>Portraits</h3>
          <p>Singles and couples I've photographed.</p>
        </a>
      </div>

      <!-- PROJECT 3 -->
      <div class="photo-item">
        <a href="project3.html">
          <img src="images/film4x5.jpg" alt="Project 3">
          <h3>35mm Film Photography</h3>
          <p>My favorite moments on film.</p>
        </a>
      </div>

    </div>

  </div>

</div>

</body>
</html>
