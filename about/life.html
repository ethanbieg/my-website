<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio</title>

  <!-- Script font -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    /* LAYOUT */
    .container {
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      padding: 40px 20px;
      background: #f5f5f5;
    }

.sidebar h2 {
  font-size: 18px;
  margin-bottom: 30px;
  font-family: 'arial', cursive;
  font-style: bold;
    }

    .sidebar a {
      display: block;
      text-decoration: none;
      color: black;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .sidebar a:hover {
      text-decoration: underline;
    }

    /* MAIN CONTENT */
    .main {
      margin-left: 240px;
      padding: 40px;
      width: calc(100% - 240px);
      text-align: center; /* centers everything inside */
    }

    .main h1 {
      font-size: 32px;
      margin-bottom: 40px;
    }

    /* FEATURE IMAGE */
    .feature-image {
      width: 100%;
      max-width: 700px;
      height: auto;
      object-fit: cover;
      margin-bottom: 2px;
    }

    /* SCRIPT TEXT */
    .script-text {
      font-family: 'Segoe Script', cursive;
      font-size: 15.40px;
      color: #333;
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .main {
        margin-left: 0;
        width: 100%;
      }

      .sidebar {
        position: relative;
        width: 100%;
        height: auto;
      }
    }

  </style>
</head>

<body>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>Ethan David Bieg</h2>

    <a href="../index.html">Home</a>
    <a href="../about.html">About</a>
    <a href="../photography.html">Photography</a>
    <a href="../videography.html">Videography</a>
    <a href="../music.html">Music</a>
    <a href="../visualart.html">Visual Art</a>
    <a href="../poetry.html">Poetry</a>
    <a href="../contact.html">Contact</a>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">


    <img src="life.jpg" alt="Featured" class="feature-image">

    <div class="script-text">
      "Now this is eternal life: that they know you, 
      the only true God, and Jesus Christ, whom you 
      have sent." John 17:3
    </div>

  </div>

</div>

</body>
</html>
