<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Videography</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    /* MAIN LAYOUT */
    .container {
      display: flex;
    }

    /* SIDEBAR (LEFT) */
    .sidebar {
      width: 220px;
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      padding: 40px 20px;
      background: #f5f5f5;
    }

    .sidebar h2 {
      font-size: 18px;
      margin-bottom: 30px;
    }

    .sidebar a {
      display: block;
      text-decoration: none;
      color: black;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .sidebar a:hover {
      text-decoration: underline;
    }

    /* MAIN CONTENT (RIGHT) */
    .main {
      margin-left: 240px;
      padding: 40px;
      width: calc(100% - 240px);
    }

    /* SINGLE COLUMN VIDEO LAYOUT */
    .video-grid {
      display: flex;
      flex-direction: column; /* THIS is the key change */
      gap: 60px; /* more breathing room vertically */
      max-width: 700px; /* keeps it clean and centered-ish */
    }

    .video-item {
      width: 100%;
    }

    .video-item video {
      width: 100%;
      display: block;
      margin-bottom: 12px;
      transition: transform 0.3s ease;
    }

    .video-item:hover video {
      transform: scale(0.97);
    }

    .video-item h3 {
      font-size: 18px;
      margin: 0 0 6px;
    }

    .video-item p {
      font-size: 14px;
      color: #555;
      margin: 0;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>My Work</h2>
    
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="photography.html">Photography</a>
    <a href="videography.html">Videography</a>
    <a href="#">Music</a>
    <a href="#">Contact</a>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">

    <div class="video-grid">

      <!-- VIDEO PROJECT 1 -->
      <div class="video-item">
        <video muted loop preload="metadata">
          <source src="videos/video1.mp4" type="video/mp4">
        </video>
        <h3>Arizona 2025, A short film</h3>
        <p>Highlight reel from a trip to Phoenix, AZ in summer 2025.</p>
      </div>

      <!-- VIDEO PROJECT 2 -->
      <div class="video-item">
        <video muted loop preload="metadata">
          <source src="videos/video2.mp4" type="video/mp4">
        </video>
        <h3>Portrait Film</h3>
        <p>Short cinematic portrait session.</p>
      </div>

    </div>

  </div>

</div>

<script>
  const videos = document.querySelectorAll("video");

  videos.forEach(video => {
    video.addEventListener("mouseenter", () => {
      video.play();
    });

    video.addEventListener("mouseleave", () => {
      video.pause();
      video.currentTime = 0;
    });
  });
</script>

</body>
</html>
